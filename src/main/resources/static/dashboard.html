<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Bank Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body class="dashboard-bg">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary px-3 d-flex justify-content-between align-items-center">
    <div class="w-100 text-center position-relative">
      <span class="navbar-brand mb-0 h4 text-white text-center">🏦 Bank Management Dashboard</span>
      <div class="position-absolute end-0 top-50 translate-middle-y d-flex align-items-center gap-2">
        <button class="btn btn-outline-light" id="themeToggle">🌙</button>
        <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="text-center mb-4">
      <h3>Welcome, <span id="fullName" class="text-primary"></span></h3>
      <p class="text-muted">Username: <span id="username"></span></p>
      <p class="text-muted">Account Number: <span id="accountNumber"></span> 
        <button class="btn btn-sm btn-outline-secondary" id="copyAccBtn">Copy</button>
      </p>
    </div>

    <div class="row mb-4 justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <h5>Current Balance</h5>
            <h3 class="text-success fw-bold">₹<span id="balance">0.00</span></h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>Deposit Money</h5>
            <input type="number" id="depositAmount" class="form-control mb-2" placeholder="Enter amount" />
            <button class="btn btn-success w-100" id="depositBtn">Deposit</button>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>Withdraw Money</h5>
            <input type="number" id="withdrawAmount" class="form-control mb-2" placeholder="Enter amount" />
            <button class="btn btn-danger w-100" id="withdrawBtn">Withdraw</button>
          </div>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <input type="text" id="searchTransaction" class="form-control" placeholder="Search transactions... (type or amount)">
    </div>

    <h4 class="mb-3">Transaction History</h4>
    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-striped m-0">
          <thead class="table-dark">
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="transactionTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
