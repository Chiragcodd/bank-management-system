<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Dashboard</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body class="dashboard-bg">

  <div id="logoutModal">
    <div class="logout-box">
      <div class="logout-icon">🔐</div>
      <h5>Logout</h5>
      <p>Are you sure you want to logout from your account?</p>
      <div class="logout-btns">
        <button class="btn-stay"           id="cancelLogoutBtn">Stay</button>
        <button class="btn-confirm-logout" id="confirmLogoutBtn">Yes, Logout</button>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-dark bg-primary px-3 d-flex justify-content-between align-items-center">
    <div class="w-100 text-center position-relative">
      <span class="navbar-brand mb-0 h4 text-white">🏦 Bank Management Dashboard</span>
      <div class="position-absolute end-0 top-50 translate-middle-y d-flex align-items-center gap-2">
        <button class="btn btn-outline-light btn-sm" id="txToggleBtn">📋 Transaction History</button>
        <button class="btn btn-outline-light btn-sm" id="themeToggle">🌙</button>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="text-center mb-4">
      <h3>Welcome, <span id="fullName" class="text-primary"></span></h3>
      <p class="text-muted mb-1">Username: <span id="username"></span></p>
      <p class="text-muted">
        Account Number: <strong id="accountNumber"></strong>
        <button class="btn btn-outline-secondary btn-sm ms-2" id="copyAccBtn">Copy</button>
      </p>
    </div>

    <div class="row mb-4 justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <h5>Current Balance</h5>
            <h3 class="text-success fw-bold">₹<span id="balance">0.00</span></h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>💰 Deposit Money</h5>
            <input type="number" id="depositAmount" class="form-control mb-2" placeholder="Enter amount" min="1" />
            <button class="btn btn-success w-100" id="depositBtn">Deposit</button>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>💸 Withdraw Money</h5>
            <input type="number" id="withdrawAmount" class="form-control mb-2" placeholder="Enter amount" min="1" />
            <button class="btn btn-danger w-100" id="withdrawBtn">Withdraw</button>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-12">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h5>🔄 Transfer Money</h5>
            <div class="row g-2">
              <div class="col-md-6">
                <input type="text" id="transferAccount" class="form-control" placeholder="Enter receiver account number" />
              </div>
              <div class="col-md-4">
                <input type="number" id="transferAmount" class="form-control" placeholder="Enter amount" min="1" />
              </div>
              <div class="col-md-2">
                <button class="btn btn-primary w-100" id="transferBtn">Transfer</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="txPanel">
      <div class="mb-3">
        <input type="text" id="searchTransaction" class="form-control"
          placeholder="Search transactions... (type or amount)">
      </div>
      <h4 class="mb-3">📋 Transaction History</h4>
      <div class="card shadow-sm border-0 mb-5">
        <div class="card-body p-0">
          <table class="table table-striped m-0">
            <thead class="table-dark">
              <tr>
                <th>Date & Time</th>
                <th>Type</th>
                <th>Amount</th>
                <th>To / From Account</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="transactionTable"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastBody">Success!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
