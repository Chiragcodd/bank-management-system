<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Verify OTP</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/otp.css">
</head>
<body class="bank-bg d-flex align-items-center justify-content-center min-vh-100">

  <div class="card p-4 shadow-lg text-center login-card">
    <h3 class="mb-2 text-primary">📱 Verify OTP</h3>
    <p class="text-muted">Enter the OTP sent to your mobile</p>

    <div class="alert-banner" id="alertBanner"></div>

    <form id="otpForm" novalidate>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Mobile Number</label>
        <input type="text" class="form-control" id="mobileNumber" readonly>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">OTP</label>
        <input type="text" class="form-control" id="otp"
          placeholder="Enter OTP" maxlength="6" inputmode="numeric">
        <div class="err-msg" id="otpErr"></div>
      </div>

      <button type="submit" class="btn btn-success w-100 py-2" id="verifyBtn">
        Verify OTP
      </button>
    </form>

    <p class="mt-3 text-muted">
      OTP valid for: <span id="timer" class="fw-bold text-danger">5:00</span>
    </p>

    <button id="resendOtpBtn" class="btn btn-outline-primary btn-sm mt-2" disabled>
      Resend OTP
    </button>
  </div>

  <script src="/js/otp.js"></script>
</body>
</html>
