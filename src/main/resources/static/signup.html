<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Bank Signup</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/signup.css">
</head>
<body class="bank-bg">

  <div class="card p-3 shadow-lg text-center login-card">
    <h2 class="mb-3 text-primary fw-bold">🏦 Create Bank Account</h2>
    <p class="text-muted mb-4">Join and start banking instantly</p>

    <form id="signupForm">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="Enter full name" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Choose username" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Create password" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Mobile Number</label>
        <input type="text" class="form-control" id="mobileNumber" placeholder="10-digit number" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Account Type</label>
        <select class="form-select" id="accountType" required>
        <option value="">Select account type</option>
        <option value="SAVINGS">Savings</option>
        <option value="CURRENT">Current</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
    </form>

    <p class="mt-3 mb-0 text-muted">
      Already have an account? <a href="login.html" class="text-primary fw-semibold">Login</a>
    </p>
  </div>

  <script src="/js/signup.js"></script>
</body>
</html>
