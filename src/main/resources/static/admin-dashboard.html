<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>


  <div id="logoutModal">
    <div class="logout-box">
      <div class="logout-icon">🔐</div>
      <h5>Logout</h5>
      <p>Are you sure you want to logout from admin panel?</p>
      <div class="logout-btns">
        <button class="btn-stay"           id="cancelLogoutBtn">Stay</button>
        <button class="btn-confirm-logout" id="confirmLogoutBtn">Yes, Logout</button>
      </div>
    </div>
  </div>


  <nav class="navbar navbar-dark bg-primary px-3 d-flex justify-content-between align-items-center">
    <span class="navbar-brand text-white h4">🛡️ Admin Dashboard</span>
    <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
  </nav>

  <div class="container mt-4">

    <h3 class="mb-3">All Users & Accounts</h3>

    <div class="row mb-3">
      <div class="col-md-5">
        <div class="input-group">
          <input type="text" id="searchUsername" class="form-control"
            placeholder="Search by username...">
          <button class="btn btn-outline-primary"   id="searchBtn">Search</button>
          <button class="btn btn-outline-secondary" id="resetBtn">Reset</button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <table class="table table-striped m-0">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Full Name</th>
              <th>Email</th>
              <th>Mobile</th>
              <th>Account Number</th>
              <th>Balance</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="allAccountsTable">
            <tr>
              <td colspan="8" class="text-center text-muted py-3">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastBody">Success!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
