<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Bank Login</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="/css/bootstrap.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/login.css">

  <link rel="icon" href="data:,">
</head>

<body class="bank-bg d-flex align-items-center justify-content-center min-vh-100">

  <div class="card border-0 p-4 shadow-lg text-center login-card">

    <h2 class="mb-2 text-primary fw-bold">🏦 Secure Bank Login</h2>
    <p class="text-muted mb-4">Access your account safely</p>

    <form id="loginForm">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control"
               id="username"
               placeholder👤=" Enter your username"
               required>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control"
               id="password"
               placeholder🔐=" Enter your password"
               required>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">
        Login
      </button>
    </form>

    <p class="mt-3 mb-0 text-muted">
      Don’t have an account?
      <a href="signup.html" class="text-primary fw-semibold">Sign Up</a>
    </p>

  </div>

  <!-- Login JS -->
  <script src="/js/login.js"></script>
</body>
</html>
